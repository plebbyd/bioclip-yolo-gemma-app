# BioCLIP 2 hummingbird-feeder demo on Woodstock-cam-01.
# Submit with sesctl:
#   sesctl create --file-path job-hummingbird-demo.yaml
#   sesctl submit --job-id <ID>
#
# This node's Reolink camera exposes only the HTTP snapshot API (RTSP/554 is
# firewalled), so we capture via --snapshot-url (Reolink cmd=Snap) instead of RTSP.
#
# TODO before submitting:
#   - <SNAPSHOT_URL>   : the Reolink snapshot URL, of the form:
#                          http://<CAM_IP>:<PORT>/cgi-bin/api.cgi?cmd=Snap&channel=0&user=<USER>&password=<PASS>
#                        Keep real credentials OUT of this committed file — prefer
#                        injecting them via the SNAPSHOT_URL env on the pod, or a
#                        Sage secret, rather than hardcoding the password here.
#   - Confirm the node VSN (H00F below) matches the Woodstock node in the portal.
name: bioclip2-hummingbird-demo
plugins:
  - name: bioclip2-hummingbird
    pluginSpec:
      image: registry.sagecontinuum.org/plebbyd/bioclip2-vision:0.14.0
      args:
        - --backend
        - bioclip2
        - --mode
        - detect
        - --snapshot-url
        - "<SNAPSHOT_URL>"
        - --name
        - woodstock-cam-01
        - --bioclip-rank
        - Species
        - --bioclip-target-taxon
        - Trochilidae
        - --bioclip-min-confidence
        - "0.1"
nodeTags: []
nodes:
  H00F: true
scienceRules:
  - 'schedule(bioclip2-hummingbird): cronjob("bioclip2-hummingbird", "*/10 * * * *")'
successCriteria:
  - WallClock('1day')
